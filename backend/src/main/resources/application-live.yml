# =========================================================================
# 운영(live) 프로파일 — SPRING_PROFILES_ACTIVE=live 로 활성화.
# 비밀값(client-secret, bot-token 등)은 여기 두지 않고 환경변수(k8s Secret)로 주입한다.
# 비밀이 아닌 운영 설정(관심종목·주기·cron)만 버전관리한다.
# =========================================================================

# 운영은 HTTPS(ingress→nginx→backend) 뒤이므로 세션 쿠키에 Secure 를 강제한다
# (HTTP 로는 전송 안 됨). httpOnly·SameSite=Lax 는 base application.yml 에서 공통 적용.
server:
  servlet:
    session:
      cookie:
        secure: true

# 세션 스토어: 운영은 Redis Sentinel HA(gotgan-gitops apps/redis = master1+replica2 + sentinel3).
# base application.yml 의 standalone(localhost)을 Sentinel 로 오버라이드한다. store-type/namespace 는
# base 에서 상속(redis). 접속정보·비밀번호는 k8s Deployment env 로 주입(SPRING_DATASOURCE 와 동일 원칙):
#   REDIS_SENTINEL_NODES = rfs-gotgan-session.redis.svc.cluster.local:26379
#   REDIS_PASSWORD       = Secret gotgan-session-redis-auth (requirepass). 센티넬은 무인증.
spring:
  data:
    redis:
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:mymaster}
        nodes: ${REDIS_SENTINEL_NODES}
      password: ${REDIS_PASSWORD}

toss:
  client-id: ${TOSS_CLIENT_ID}
  client-secret: ${TOSS_CLIENT_SECRET}
  account-seq: ${TOSS_ACCOUNT_SEQ:1}
  monitor:
    enabled: true
    poll-interval-ms: 60000
    symbols:
      - "0181B0"
      - "GOOGL"
      - "DIVO"
      - "GPIQ"
      - "GPIX"
      - "JEPI"
      - "JEPQ"
      - "QDVO"
      - "QLD"
      - "QQQI"
      - "SCHD"
      - "SPYI"
      - "SSO"
      - "005930"   # 삼성전자
      - "000660"   # SK하이닉스
      - "MU"       # 마이크론 테크놀로지
      - "SNDK"     # 샌디스크
      - "SPCX"     # 스페이스X (토스 상장)
  digest:
    enabled: true
    cron: "0 0 * * * *"     # 매시 정각 KST

telegram:
  enabled: true
  bot-token: ${TELEGRAM_BOT_TOKEN}
  chat-id: ${TELEGRAM_CHAT_ID}
