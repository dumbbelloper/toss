# gotgan web — SPA 서빙 + same-origin BFF 리버스프록시.
# 백엔드 경로(/api, /oauth2, /login/oauth2, /logout)를 backend 서비스로 프록시해
# 브라우저 입장에서 app.gotgan.live 단일 오리진(세션쿠키 동작)으로 만든다. (dev의 vite proxy와 동형)
upstream backend {
    server backend.gotgan.svc.cluster.local:8080;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # BFF 프록시 공통 헤더 (OAuth2 redirect URI가 https://app.gotgan.live 로 생성되도록)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;

    # --- BFF: 백엔드로 프록시 ---
    location /api          { proxy_pass http://backend; }
    location /oauth2       { proxy_pass http://backend; }
    location /login/oauth2 { proxy_pass http://backend; }
    location /logout       { proxy_pass http://backend; }

    # --- SPA ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
